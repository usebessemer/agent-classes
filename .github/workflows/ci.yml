name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.12 = the requires-python floor; 3.14 = the dev version.
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The [test] extra pins pytest + pytest-asyncio; asyncio_mode = auto is in
      # pyproject, so the async suite runs self-contained with no extra config.
      - name: Install
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest
